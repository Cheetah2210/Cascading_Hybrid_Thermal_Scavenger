name: Physics Engine Verification

on: [push, pull_request]

jobs:
  verify-physics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # v4 supports Node.js 24 environment
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        # v5 supports Node.js 24 environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy

      - name: Run Physics Verification Tests
        run: pytest tests/
